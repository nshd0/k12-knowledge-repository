# Frontmatter schema for knowledge/ files
# All fields listed as required must be present in every knowledge Markdown file.
# This schema is read by monthly_audit.py to validate content files.

version: "1.0"
updated: "2026-06-17"

fields:

  id:
    type: string
    required: true
    description: Unique identifier matching the row ID in data/master_repository.csv
    pattern: "^(FW|CR|CB|AS|PD|SR)-[0-9]{3}$"
    example: FW-001

  title:
    type: string
    required: true
    description: Short, descriptive title for the knowledge entry
    max_length: 120

  stakeholder:
    type: array
    required: true
    description: One or more stakeholder groups this entry is written for
    items:
      enum:
        - Principal
        - Teacher
        - Student
        - Parent
        - Coordinator
        - All

  grade_band:
    type: string
    required: true
    description: School stage this entry applies to
    enum:
      - Foundational
      - Preparatory
      - Middle
      - Secondary
      - All

  topic:
    type: string
    required: true
    description: Primary topic domain
    enum:
      - Policy
      - Curriculum
      - Assessment
      - Pedagogy
      - Capacity Building
      - Subject Resource
      - Governance

  source:
    type: string
    required: true
    description: Short name of the primary official source (e.g. NEP 2020, CBSE Circular)

  effective_date:
    type: string
    required: true
    description: Publication or effective date of the source document (ISO 8601)
    format: "YYYY-MM-DD"
    stale_threshold_months: 18
    note: >-
      Files whose effective_date is more than 18 months old will be flagged
      as stale in the monthly audit and must be reviewed before staying active.

  content_owner:
    type: string
    required: true
    description: Official body or person responsible for the source content
    example: Ministry of Education

  review_status:
    type: string
    required: true
    description: Content review state — only 'approved' files enter the RAG index
    enum:
      - approved
      - pending_review
      - archived
      - superseded

  license:
    type: string
    required: true
    description: License under which the summary may be reused
    example: CC BY-SA 4.0

# Validation rules applied by monthly_audit.py
validation:
  check_missing_fields: true
  check_stale_effective_date: true
  stale_threshold_months: 18
  check_unknown_enum_values: true
  check_id_matches_master_repository: true
  check_duplicate_ids: true
