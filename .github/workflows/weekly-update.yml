name: Weekly — Repository Data Refresh

on:
  schedule:
    - cron: "30 3 * * 1"   # Monday 3:30am UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run - skip commit (true/false)"
        required: false
        default: "true"

jobs:
  weekly-refresh:
    name: Ingest → Tag → Digest → Export → Notify → Commit
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write     # needed for the coordinator alert issue

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Step 1: Data refresh ──────────────────────────────────────────────
      - name: Run source ingestion
        run: python scripts/ingest_sources.py

      - name: Run document tagger
        run: python scripts/tag_documents.py

      - name: Generate weekly digest
        run: python scripts/weekly_digest.py

      # ── Step 2: NotebookLM packs ─────────────────────────────────────────
      - name: Generate NotebookLM export packs
        run: |
          python scripts/generate_notebooklm_packs.py
          echo "NotebookLM packs regenerated."

      - name: Capture pack manifest
        id: manifest
        run: |
          python - <<'PYEOF'
          import json, os
          from pathlib import Path
          m = Path('exports/notebooklm/MANIFEST.json')
          if m.exists():
              data = json.loads(m.read_text())
              lines = []
              for role, info in data.get('packs', {}).items():
                  lines.append(f"| {role} | {info['records']} | {info['file']} |")
              table = '\n'.join(lines)
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"pack_table<<EOF\n{table}\nEOF\n")
                  f.write(f"generated={data['generated']}\n")
          PYEOF

      # ── Step 3: Re-index ChromaDB (if CHROMA_PERSIST_PATH is set) ────────
      - name: Re-index knowledge base into ChromaDB
        run: |
          if [ -d "knowledge" ] && [ "$(find knowledge -name '*.md' | head -1)" ]; then
            pip install -q chromadb sentence-transformers python-frontmatter
            python -m retrieval.ingest --path knowledge
          else
            echo "No knowledge/ .md files yet — skipping ChromaDB index step."
          fi
        continue-on-error: true   # don't block weekly refresh if Chroma fails

      # ── Step 4: Write update log ──────────────────────────────────────────
      - name: Write update log entry
        run: |
          python - <<'PYEOF'
          from pathlib import Path
          from datetime import datetime, timezone
          log = Path('docs/update_log.md')
          if not log.exists():
              print('update_log.md not found, skipping.')
              exit(0)
          today = datetime.now(timezone.utc).strftime('%Y-%m-%d')
          entry = f'| {today} | github-actions[bot] | Weekly automated refresh + NotebookLM packs generated | data/, exports/notebooklm/ |\n'
          text = log.read_text(encoding='utf-8')
          lines = text.splitlines(keepends=True)
          for i, line in enumerate(lines):
              if line.startswith('|---'):
                  lines.insert(i + 1, entry)
                  break
          log.write_text(''.join(lines), encoding='utf-8')
          print(f'Log entry added for {today}')
          PYEOF

      # ── Step 5: Commit ────────────────────────────────────────────────────
      - name: Commit and push
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/ exports/notebooklm/
          git diff --cached --quiet && echo "Nothing to commit" || \
            git commit -m "chore(data): Weekly automated refresh + NotebookLM packs [skip ci]" && git push

      - name: Dry run notice
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run complete. No changes committed."

      # ── Step 6: Coordinator alert issue ───────────────────────────────────
      - name: Post coordinator alert
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const table = `${{ steps.manifest.outputs.pack_table }}`;
            const generated = `${{ steps.manifest.outputs.generated }}`;

            // Close any open weekly-refresh alert issues from previous weeks
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'weekly-refresh-alert',
              state: 'open',
            });
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

            // Open a fresh alert issue
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Weekly Refresh] NotebookLM packs ready — ${today}`,
              labels: ['weekly-refresh-alert'],
              body: [
                '## ✅ Weekly data refresh complete',
                '',
                `**Date:** ${generated}`,
                '',
                '### NotebookLM packs ready for upload',
                '',
                '| Role | Records | File |',
                '|---|---|---|',
                table,
                '',
                '### Upload steps',
                '1. Go to [exports/notebooklm/](../tree/main/exports/notebooklm/)',
                '2. Download the `.md` file for each role',
                '3. Open the matching notebook at [notebooklm.google.com](https://notebooklm.google.com)',
                '4. **+ Add source → Upload file** → replace the previous version',
                '5. Close this issue when all notebooks are updated ✓',
                '',
                '---',
                '_This issue is auto-created by `weekly-update.yml`. Close it when upload is done._',
              ].join('\n'),
            });
      
      # ── Step 7: Summary ───────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "### Weekly Refresh Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Ingest, tag, digest: done" >> $GITHUB_STEP_SUMMARY
          echo "- NotebookLM packs: generated in exports/notebooklm/" >> $GITHUB_STEP_SUMMARY
          echo "- ChromaDB re-index: attempted" >> $GITHUB_STEP_SUMMARY
          echo "- Coordinator alert issue: posted" >> $GITHUB_STEP_SUMMARY
          echo "- Dry run: ${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
