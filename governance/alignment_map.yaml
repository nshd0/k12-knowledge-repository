# ─────────────────────────────────────────────
# GOVERNANCE AND SAFETY RULES
# ─────────────────────────────────────────────
governance:
  safety_keywords_blocklist:
    - "violence"
    - "abuse"
    - "explicit"
    - "hateful"
    - "discriminatory"

  age_bands:
    foundational: [1, 2, 3, 4, 5]
    preparatory: [6, 7, 8]
    middle: [9, 10]
    secondary: [11, 12]

  approval_required_for:
    - content_type: "assessment"
      min_review_days: 2
    - content_type: "policy"
      min_review_days: 5
    - content_type: "framework"
      min_review_days: 5

  auto_approve_allowed_for:
    - content_type: "activity"
      conditions: ["grade <= 5", "review_status == review"]
    - content_type: "resource"
      conditions: ["source in ['NCERT', 'DIKSHA', 'MoE']", "review_status == review"]
