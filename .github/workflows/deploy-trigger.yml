name: Netlify — Deploy Trigger

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "src/**"
      - "scripts/**"
      - "netlify.toml"
      - "package.json"
      - "index.html"
  workflow_dispatch:

jobs:
  trigger-deploy:
    name: Trigger Netlify Rebuild
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Trigger Netlify deploy hook
        run: |
          if [ -z "$NETLIFY_DEPLOY_HOOK" ]; then
            echo "NETLIFY_DEPLOY_HOOK secret not set."
            echo "Add it at: GitHub Repo Settings -> Secrets -> Actions"
            echo "Get URL from: Netlify -> Site Settings -> Build & Deploy -> Build hooks"
          else
            curl -s -X POST "$NETLIFY_DEPLOY_HOOK"
            echo "Netlify deploy triggered."
          fi
        env:
          NETLIFY_DEPLOY_HOOK: ${{ secrets.NETLIFY_DEPLOY_HOOK }}

      - name: Summary
        run: echo "### Netlify Deploy Trigger ran" >> $GITHUB_STEP_SUMMARY
