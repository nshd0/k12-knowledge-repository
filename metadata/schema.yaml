# metadata/schema.yaml
# Canonical metadata schema for all knowledge base documents.
# Used by trigger_ingestion.yml to validate frontmatter before RAG indexing.

version: "1.0"
effective_date: "2026-06-17"
maintained_by: "nshd0/k12-knowledge-repository"

required_fields:
  - id
  - title
  - stakeholder
  - grade_band
  - topic
  - source
  - effective_date
  - content_owner
  - review_status
  - license

field_definitions:
  id:
    type: string
    pattern: "^[A-Z]{2}-[0-9]{3}$"
    description: "Unique identifier matching data CSV IDs (e.g. FW-001)"
  title:
    type: string
    description: "Short descriptive title"
  stakeholder:
    type: array
    items:
      enum: [Principal, Teacher, Student, Parent, Coordinator, All]
    description: "Target audience roles"
  grade_band:
    type: string
    enum: [Foundational, Preparatory, Middle, Secondary, All]
    description: "NEP 2020 stage (5+3+3+4)"
  topic:
    type: string
    description: "Domain topic e.g. Assessment, Pedagogy, Policy, Curriculum"
  source:
    type: string
    description: "Authoritative source name e.g. NEP 2020, NCF-SE 2023, CBSE"
  effective_date:
    type: string
    format: date
    description: "YYYY-MM-DD date the content became effective or was last verified"
  content_owner:
    type: string
    description: "Organisation responsible for the content e.g. NCERT, CBSE, MoE"
  review_status:
    type: string
    enum: [approved, pending_review, archived]
    description: "Must be 'approved' before content is ingested into RAG index"
  license:
    type: string
    description: "License for original summaries e.g. CC BY-SA 4.0"

ingestion_rules:
  block_if_review_status_not_approved: true
  require_learning_outcome_in_alignment_map: false
  allow_external_links: true
  block_ncert_textbook_prose: true
