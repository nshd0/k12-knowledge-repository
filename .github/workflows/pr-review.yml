name: PR — Review Checklist

# Runs on every pull request to main.
# Validates data, builds the app, and posts a checklist comment on the PR.

on:
  pull_request:
    branches: [main]

jobs:
  pr-checks:
    name: PR Data + Build Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: npm ci

      - name: Validate CSV data
        id: data_check
        run: |
          python - <<'EOF'
          import csv, sys
          from pathlib import Path
          f = Path('data/master_repository.csv')
          rows = list(csv.DictReader(f.open(encoding='utf-8')))
          print(f'Records in master_repository.csv: {len(rows)}')
          EOF

      - name: Run preprocess
        run: node scripts/preprocess_data.js

      - name: Build
        run: npx vite build
        env:
          VITE_API_BASE: /.netlify/functions

      - name: Post PR summary comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## \u2705 PR Validation Passed',
                '',
                '| Check | Status |',
                '|---|---|',
                '| CSV data validation | \u2705 Passed |',
                '| Data preprocessing | \u2705 Passed |',
                '| Production build | \u2705 Passed |',
                '',
                '**Reviewer checklist:**',
                '- [ ] New data rows follow the correct column schema',
                '- [ ] All IDs are unique and follow naming convention',
                '- [ ] All links point to official government/board sources',
                '- [ ] Status is one of: Active, Archived, Superseded, Pending Review',
                '- [ ] `docs/update_log.md` has been updated',
              ].join('\n')
            })
