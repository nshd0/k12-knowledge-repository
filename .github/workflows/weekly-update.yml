name: Weekly — Repository Data Refresh

on:
  schedule:
    - cron: "30 3 * * 1"   # Monday 3:30am UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run - skip commit (true/false)"
        required: false
        default: "true"

jobs:
  weekly-refresh:
    name: Ingest → Tag → Digest → Export → Notify → Commit
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # ── Step 1: Data refresh ──────────────────────────────────────────────
      - name: Run source ingestion
        id: ingest
        run: python scripts/ingest_sources.py

      - name: Run document tagger
        run: python scripts/tag_documents.py

      - name: Generate weekly digest
        id: digest
        run: python scripts/weekly_digest.py

      # ── Step 2: Check if there are actual changes ────────────────────────
      # If no new/changed records, skip commit + alert entirely.
      # This prevents empty bot commits that pollute git history.
      - name: Detect real changes
        id: changes
        run: |
          git diff --name-only HEAD > /tmp/changed_files.txt
          cat /tmp/changed_files.txt
          if grep -qE '^data/' /tmp/changed_files.txt; then
            echo "has_data_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_data_changes=false" >> $GITHUB_OUTPUT
          fi
          echo "changed_files=$(cat /tmp/changed_files.txt | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Skip notice (no changes)
        if: steps.changes.outputs.has_data_changes == 'false'
        run: |
          echo "No data changes detected this week — skipping commit and coordinator alert."
          echo "### Weekly Refresh — No Changes" >> $GITHUB_STEP_SUMMARY
          echo "- All source data matches last week's state" >> $GITHUB_STEP_SUMMARY
          echo "- No commit pushed, no NotebookLM packs regenerated" >> $GITHUB_STEP_SUMMARY
          echo "- Next run: Monday" >> $GITHUB_STEP_SUMMARY

      # ── Step 3: NotebookLM packs (only when data changed) ───────────────
      - name: Generate NotebookLM export packs
        if: steps.changes.outputs.has_data_changes == 'true'
        run: python scripts/generate_notebooklm_packs.py

      - name: Capture pack manifest
        if: steps.changes.outputs.has_data_changes == 'true'
        id: manifest
        run: |
          python - <<'PYEOF'
          import json, os
          from pathlib import Path
          m = Path('exports/notebooklm/MANIFEST.json')
          if m.exists():
              data = json.loads(m.read_text())
              lines = []
              for role, info in data.get('packs', {}).items():
                  lines.append(f"| {role} | {info['records']} | {info['file']} |")
              table = '\n'.join(lines)
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"pack_table<<EOF\n{table}\nEOF\n")
                  f.write(f"generated={data['generated']}\n")
          PYEOF

      # ── Step 4: Re-index ChromaDB ──────────────────────────────────────
      - name: Re-index knowledge base into ChromaDB
        if: steps.changes.outputs.has_data_changes == 'true'
        run: |
          if [ -d "knowledge" ] && [ "$(find knowledge -name '*.md' | head -1)" ]; then
            pip install -q chromadb sentence-transformers python-frontmatter
            python -m retrieval.ingest --path knowledge
          else
            echo "No knowledge/ .md files yet — skipping ChromaDB index step."
          fi
        continue-on-error: true

      # ── Step 5: Write update log ──────────────────────────────────────────
      - name: Write update log entry
        if: steps.changes.outputs.has_data_changes == 'true'
        run: |
          python - <<'PYEOF'
          from pathlib import Path
          from datetime import datetime, timezone
          log = Path('docs/update_log.md')
          if not log.exists():
              print('update_log.md not found, skipping.')
              exit(0)
          today = datetime.now(timezone.utc).strftime('%Y-%m-%d')
          entry = f'| {today} | github-actions[bot] | Weekly automated refresh + NotebookLM packs generated | data/, exports/notebooklm/ |\n'
          text = log.read_text(encoding='utf-8')
          lines = text.splitlines(keepends=True)
          for i, line in enumerate(lines):
              if line.startswith('|---'):
                  lines.insert(i + 1, entry)
                  break
          log.write_text(''.join(lines), encoding='utf-8')
          PYEOF

      # ── Step 6: Commit (only when data changed, not a dry run) ──────────
      - name: Commit and push
        if: >
          steps.changes.outputs.has_data_changes == 'true' &&
          github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/ exports/notebooklm/
          git diff --cached --quiet && echo "Nothing to stage" || \
            git commit -m "chore(data): Weekly refresh — $(python -c "import json; s=json.load(open('docs/digest_state.json')); print(f\"{len(s['ids'])} records\")" 2>/dev/null || echo 'data updated') [skip ci]" && git push

      - name: Dry run notice
        if: github.event.inputs.dry_run == 'true'
        run: echo "Dry run complete. No changes committed."

      # ── Step 7: Coordinator alert issue (only when data changed) ───────
      - name: Post coordinator alert
        if: >
          steps.changes.outputs.has_data_changes == 'true' &&
          github.event.inputs.dry_run != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const table = `${{ steps.manifest.outputs.pack_table }}`;
            const generated = `${{ steps.manifest.outputs.generated }}`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'weekly-refresh-alert',
              state: 'open',
            });
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Weekly Refresh] NotebookLM packs ready — ${today}`,
              labels: ['weekly-refresh-alert'],
              body: [
                '## ✅ Weekly data refresh complete — real changes detected',
                '',
                `**Date:** ${generated}`,
                '',
                '### NotebookLM packs ready for upload',
                '',
                '| Role | Records | File |',
                '|---|---|---|',
                table,
                '',
                '### Upload steps',
                '1. Go to [exports/notebooklm/](../tree/main/exports/notebooklm/)',
                '2. Download the `.md` file for each role',
                '3. Open the matching notebook at [notebooklm.google.com](https://notebooklm.google.com)',
                '4. **+ Add source → Upload file** → replace the previous version',
                '5. Close this issue when all notebooks are updated ✓',
                '',
                '---',
                '_This issue is auto-created only when real data changes are detected._',
              ].join('\n'),
            });

      # ── Step 8: Job summary ───────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "### Weekly Refresh Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Data changes detected: ${{ steps.changes.outputs.has_data_changes }}" >> $GITHUB_STEP_SUMMARY
          echo "- Changed files: ${{ steps.changes.outputs.changed_files }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry run: ${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
