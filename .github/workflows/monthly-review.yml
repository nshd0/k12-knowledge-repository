name: Monthly — Content Audit Report

# Runs on the 2nd of each month (day after data-integrity URL sweep)
# and on manual dispatch. Produces a human-readable audit issue that
# coordinators can work through and close.

on:
  schedule:
    - cron: "0 6 2 * *"    # 2nd of month, 6am UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run - open issue but do not commit report file"
        required: false
        default: "false"

jobs:
  content-audit:
    name: Audit → Report → Issue
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install python-frontmatter PyYAML

      # ── Step 1: Validate knowledge/ frontmatter ──────────────────────
      - name: Validate knowledge/ frontmatter
        id: frontmatter_check
        run: |
          python - <<'PYEOF'
          import os, sys, yaml
          from pathlib import Path
          import frontmatter as fm

          SCHEMA_PATH = Path('metadata/schema.yaml')
          KNOWLEDGE_DIR = Path('knowledge')
          STALE_MONTHS = 18

          from datetime import date, timedelta
          from dateutil.relativedelta import relativedelta

          schema = yaml.safe_load(SCHEMA_PATH.read_text())
          required_fields = [k for k, v in schema['fields'].items() if v.get('required')]

          errors = []
          stale = []
          today = date.today()

          for md_file in sorted(KNOWLEDGE_DIR.rglob('*.md')):
              if md_file.name == 'README.md':
                  continue
              try:
                  post = fm.load(str(md_file))
              except Exception as e:
                  errors.append(f"{md_file}: could not parse frontmatter — {e}")
                  continue
              meta = post.metadata
              for field in required_fields:
                  if field not in meta or meta[field] in (None, '', []):
                      errors.append(f"{md_file}: missing required field '{field}'")
              # Check stale effective_date
              eff = meta.get('effective_date')
              if eff:
                  try:
                      eff_date = date.fromisoformat(str(eff))
                      cutoff = today - relativedelta(months=STALE_MONTHS)
                      if eff_date < cutoff and meta.get('review_status') == 'approved':
                          stale.append(f"{md_file}: effective_date {eff_date} is older than {STALE_MONTHS} months")
                  except ValueError:
                      errors.append(f"{md_file}: effective_date '{eff}' is not a valid YYYY-MM-DD date")

          output = os.environ.get('GITHUB_OUTPUT', '')
          with open(output, 'a') as f:
              f.write(f"frontmatter_errors={len(errors)}\n")
              f.write(f"stale_files={len(stale)}\n")

          if errors or stale:
              print("=== FRONTMATTER ERRORS ===")
              for e in errors:
                  print(e)
              print("=== STALE EFFECTIVE DATES ===")
              for s in stale:
                  print(s)
              # Write summary for audit report
              summary_path = Path('docs/frontmatter_audit_summary.txt')
              summary_path.parent.mkdir(exist_ok=True)
              summary_path.write_text(
                  'FRONTMATTER ERRORS\n' + '\n'.join(errors) +
                  '\n\nSTALE FILES\n' + '\n'.join(stale)
              )
          else:
              print("All knowledge/ frontmatter is valid and no stale files found.")
          PYEOF

      # ── Step 2: Run main audit script ────────────────────────────────
      - name: Run monthly audit
        id: audit
        run: python scripts/monthly_audit.py

      # ── Step 3: Commit report ─────────────────────────────────────────
      - name: Commit audit report
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/monthly_audit_report.md docs/frontmatter_audit_summary.txt || true
          git diff --cached --quiet && echo "Report unchanged" || \
            git commit -m "chore(docs): Monthly content audit report $(date +%Y-%m) [skip ci]" && git push

      # ── Step 4: Open coordinator issue ───────────────────────────────
      - name: Read audit summary
        id: summary
        run: |
          python - <<'PYEOF'
          import json, os
          from pathlib import Path
          report = Path('docs/monthly_audit_report.md')
          if not report.exists():
              print('No report found')
              exit(0)
          lines = report.read_text(encoding='utf-8').splitlines()
          table_lines = []
          in_table = False
          for line in lines:
              if '## Executive summary' in line:
                  in_table = True
                  continue
              if in_table:
                  if line.startswith('|'):
                      table_lines.append(line)
                  elif table_lines and not line.startswith('|'):
                      break
          table = '\n'.join(table_lines)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"exec_table<<EOF\n{table}\nEOF\n")
          PYEOF

      - name: Read frontmatter summary counts
        id: fm_counts
        run: |
          echo "fm_errors=${{ steps.frontmatter_check.outputs.frontmatter_errors }}" >> $GITHUB_OUTPUT
          echo "stale_files=${{ steps.frontmatter_check.outputs.stale_files }}" >> $GITHUB_OUTPUT

      - name: Post monthly audit issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const month = today.slice(0, 7);
            const table = `${{ steps.summary.outputs.exec_table }}`;
            const fmErrors = `${{ steps.frontmatter_check.outputs.frontmatter_errors }}`;
            const staleFiles = `${{ steps.frontmatter_check.outputs.stale_files }}`;

            // Close previous monthly audit issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'monthly-audit',
              state: 'open',
            });
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Monthly Audit] Content quality review — ${month}`,
              labels: ['monthly-audit'],
              body: [
                `## 🔍 Monthly content audit — ${month}`,
                '',
                'The automated audit has reviewed all records in `data/master_repository.csv` and all `knowledge/` frontmatter.',
                'Full report: [`docs/monthly_audit_report.md`](../blob/main/docs/monthly_audit_report.md)',
                '',
                '### Data integrity summary',
                '',
                '| Issue type | Count | Action required |',
                '|---|---|---|',
                table,
                '',
                '### Knowledge frontmatter summary',
                '',
                `| Check | Count |`,
                `|---|---|`,
                `| Missing required frontmatter fields | ${fmErrors} |`,
                `| Stale effective_date (>18 months, status: approved) | ${staleFiles} |`,
                '',
                fmErrors > 0 || staleFiles > 0
                  ? '> ⚠️ See [`docs/frontmatter_audit_summary.txt`](../blob/main/docs/frontmatter_audit_summary.txt) for the full list of affected files.'
                  : '> ✅ All knowledge/ frontmatter is valid and up to date.',
                '',
                '### How to fix data integrity issues',
                '',
                '1. Open `data/master_repository.csv`',
                '2. Find the flagged rows (IDs listed in the full report)',
                '3. Fill missing fields / update Effective Date / remove archived entries',
                '4. Open a PR — `data-integrity.yml` will validate your changes',
                '',
                '### How to fix frontmatter issues',
                '',
                '1. Open the affected file listed in `docs/frontmatter_audit_summary.txt`',
                '2. Add or correct the missing frontmatter field (see `metadata/schema.yaml` for allowed values)',
                '3. For stale files: update the summary content and set a new `effective_date`, or set `review_status: archived`',
                '4. Open a PR — frontmatter will be validated automatically',
                '',
                '5. Close this issue when all items are resolved',
                '',
                '---',
                '_Auto-generated by `monthly-review.yml`. Close when actioned._',
              ].join('\n'),
            });

      # ── Step 5: Summary ───────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "### Monthly Audit Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Report written to docs/monthly_audit_report.md" >> $GITHUB_STEP_SUMMARY
          echo "- Frontmatter errors: ${{ steps.frontmatter_check.outputs.frontmatter_errors }}" >> $GITHUB_STEP_SUMMARY
          echo "- Stale knowledge files: ${{ steps.frontmatter_check.outputs.stale_files }}" >> $GITHUB_STEP_SUMMARY
          echo "- Coordinator issue opened with label 'monthly-audit'" >> $GITHUB_STEP_SUMMARY
          echo "- Dry run: ${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
