# governance/alignment_map.yaml
# Maps knowledge base domains to NEP 2020 / NCF-SE 2023 structural outcomes.
# Used by trigger_ingestion.yml to validate learning_outcome references.

version: "1.0"
effective_date: "2026-06-17"

policy:
  description: "National policy and legislative frameworks"
  source_authority: "Ministry of Education, Government of India"
  outcomes:
    POL-001: "Understand the vision and principles of NEP 2020"
    POL-002: "Apply the 5+3+3+4 curricular and pedagogical structure"
    POL-003: "Align school practices with NCF-SE 2023 recommendations"
    POL-004: "Implement RTE Act obligations at school level"
    POL-005: "Understand NDEAR digital education architecture"

curriculum:
  description: "Curriculum frameworks and learning outcomes by stage"
  source_authority: "NCERT"
  outcomes:
    CUR-001: "Foundational stage (ages 3-8) learning competencies per NCF-FS 2022"
    CUR-002: "Preparatory stage (Grades 3-5) subject learning outcomes"
    CUR-003: "Middle stage (Grades 6-8) subject learning outcomes"
    CUR-004: "Secondary stage (Grades 9-12) subject learning outcomes"
    CUR-005: "Multilingual and mother-tongue education principles"
    CUR-006: "Vocational and life skills integration per NEP 2020"

assessment:
  description: "Assessment frameworks, tools, and rubrics"
  source_authority: "NCERT / CBSE / MoE"
  outcomes:
    ASS-001: "Understand competency-based assessment vs marks-based assessment"
    ASS-002: "Design formative assessments aligned to NCF-SE 2023 outcomes"
    ASS-003: "Interpret holistic progress card (HPC) guidelines"
    ASS-004: "Apply PARAKH framework for equitable assessment"
    ASS-005: "Track NIPUN Bharat FLN milestones for Grades 1-3"

pedagogy:
  description: "Teaching methods, pedagogical frameworks, and classroom practice"
  source_authority: "NCERT / CBSE"
  outcomes:
    PED-001: "Apply experiential and activity-based learning"
    PED-002: "Implement project-based learning frameworks"
    PED-003: "Use inclusive education practices for CWSN"
    PED-004: "Integrate ICT and digital tools effectively"
    PED-005: "Support social-emotional learning in classrooms"
    PED-006: "Apply assessment for learning (AfL) strategies"

teacher_development:
  description: "Teacher training, professional development, and leadership"
  source_authority: "NCERT / CBSE / MoE"
  outcomes:
    TPD-001: "Complete NISHTHA foundational and advanced training"
    TPD-002: "Access DIKSHA for continuous professional learning"
    TPD-003: "Understand school leadership roles per NCF-SE 2023"
    TPD-004: "Implement peer learning communities"
