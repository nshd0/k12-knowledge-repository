name: Weekly — Repository Data Refresh

on:
  schedule:
    - cron: "30 3 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run - skip commit (true/false)"
        required: false
        default: "true"

jobs:
  weekly-refresh:
    name: Ingest → Tag → Digest → Commit
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run source ingestion
        run: python scripts/ingest_sources.py

      - name: Run document tagger
        run: python scripts/tag_documents.py

      - name: Generate weekly digest
        run: python scripts/weekly_digest.py

      - name: Write update log entry
        run: |
          python - <<'PYEOF'
          from pathlib import Path
          from datetime import datetime, timezone
          log = Path('docs/update_log.md')
          today = datetime.now(timezone.utc).strftime('%Y-%m-%d')
          entry = f'| {today} | github-actions[bot] | Weekly automated refresh | data/, docs/weekly_digest.md |\n'
          text = log.read_text(encoding='utf-8')
          lines = text.splitlines(keepends=True)
          for i, line in enumerate(lines):
              if line.startswith('|---'):
                  lines.insert(i + 1, entry)
                  break
          log.write_text(''.join(lines), encoding='utf-8')
          print(f'Log entry added for {today}')
          PYEOF

      - name: Commit and push
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "chore(data): Weekly automated repository refresh [skip ci]"
          git push

      - name: Dry run notice
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run complete. No changes committed."

      - name: Summary
        run: |
          echo "### Weekly Refresh Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Ingest, tag, digest scripts ran" >> $GITHUB_STEP_SUMMARY
          echo "- Dry run: ${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
